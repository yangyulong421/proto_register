syntax = "proto3";

package config;

option go_package = "proto_register/rpc/config";

import "common/common.proto";

// =============================================================================
// Config 配置服务 — RPC 接口定义
//
// 核心职责：
//   全局配置项 CRUD、功能开关管理
//   配置变更监听（服务端流式推送）
//
// WatchConfig 接口设计：
//   采用 server streaming RPC，服务端在配置变更时主动推送
//   相比长轮询方案，减少无效请求，降低延迟
//   客户端断线后重新建流，传入 last_version 实现增量同步
// =============================================================================

// ==================== 服务特有类型 ====================

// 配置项
message ConfigItem {
  string config_id   = 1; // 配置项唯一标识
  string service     = 2; // 所属服务名称
  string key         = 3; // 配置键
  string value       = 4; // 配置值
  string description = 5; // 配置描述
  string data_type   = 6; // 数据类型（string / int / bool / json）
  int64  version     = 7; // 配置版本号
  int64  updated_at  = 8; // 最后更新时间戳
  string updated_by  = 9; // 最后更新人
}

// 功能开关
message FeatureFlag {
  string flag_id     = 1; // 功能开关唯一标识
  string name        = 2; // 功能开关名称
  bool   enabled     = 3; // 是否启用
  string description = 4; // 功能开关描述
  string rules       = 5; // 规则配置（JSON 格式，支持百分比灰度、用户白名单等）
  int64  updated_at  = 6; // 最后更新时间戳
}

// ==================== 服务定义 ====================

service ConfigService {
  // 获取单个配置项
  rpc GetConfig(GetConfigReq) returns (GetConfigResp);
  // 批量获取配置项
  rpc BatchGetConfig(BatchGetConfigReq) returns (BatchGetConfigResp);
  // 设置配置项
  rpc SetConfig(SetConfigReq) returns (SetConfigResp);
  // 删除配置项
  rpc DeleteConfig(DeleteConfigReq) returns (DeleteConfigResp);
  // 获取服务所有配置
  rpc GetServiceConfigs(GetServiceConfigsReq) returns (GetServiceConfigsResp);

  // 监听配置变更（server streaming — 配置变更时实时推送）
  rpc WatchConfig(WatchConfigReq) returns (stream WatchConfigResp);

  // 获取功能开关列表
  rpc GetFeatureFlags(GetFeatureFlagsReq) returns (GetFeatureFlagsResp);
  // 设置功能开关
  rpc SetFeatureFlag(SetFeatureFlagReq) returns (SetFeatureFlagResp);
}

// ==================== 请求/响应 ====================

// --- GetConfig ---
message GetConfigReq {
  string service = 1; // 服务名称
  string key     = 2; // 配置键
}

message GetConfigResp {
  common.ResponseMeta meta   = 1; // 响应元数据
  ConfigItem          config = 2; // 配置项信息
}

// --- BatchGetConfig ---
message BatchGetConfigReq {
  string          service = 1; // 服务名称
  repeated string keys    = 2; // 配置键列表
}

message BatchGetConfigResp {
  common.ResponseMeta  meta    = 1; // 响应元数据
  repeated ConfigItem  configs = 2; // 配置项列表
}

// --- SetConfig ---
message SetConfigReq {
  string service     = 1; // 服务名称
  string key         = 2; // 配置键
  string value       = 3; // 配置值
  string description = 4; // 配置描述
  string data_type   = 5; // 数据类型
  string operator_id = 6; // 操作人 ID
}

message SetConfigResp {
  common.ResponseMeta meta   = 1; // 响应元数据
  ConfigItem          config = 2; // 更新后的配置项
}

// --- DeleteConfig ---
message DeleteConfigReq {
  string service     = 1; // 服务名称
  string key         = 2; // 配置键
  string operator_id = 3; // 操作人 ID
}

message DeleteConfigResp {
  common.ResponseMeta meta = 1; // 响应元数据
}

// --- GetServiceConfigs ---
message GetServiceConfigsReq {
  string            service    = 1; // 服务名称
  common.Pagination pagination = 2; // 分页参数
}

message GetServiceConfigsResp {
  common.ResponseMeta     meta              = 1; // 响应元数据
  repeated ConfigItem     configs           = 2; // 配置项列表
  common.PaginationResult pagination_result = 3; // 分页结果信息
}

// --- WatchConfig (server streaming) ---
message WatchConfigReq {
  string          service        = 1; // 服务名称
  repeated string keys           = 2; // 监听的配置键列表
  int64           last_version   = 3; // 客户端已知的最新版本号（增量同步起点）
}

message WatchConfigResp {
  common.ResponseMeta meta        = 1; // 响应元数据
  repeated ConfigItem changes     = 2; // 变更的配置项列表
  bool                has_changes = 3; // 是否有变更
}

// --- GetFeatureFlags ---
message GetFeatureFlagsReq {
  string            service    = 1; // 服务名称（可选，为空获取所有）
  common.Pagination pagination = 2; // 分页参数
}

message GetFeatureFlagsResp {
  common.ResponseMeta     meta              = 1; // 响应元数据
  repeated FeatureFlag    flags             = 2; // 功能开关列表
  common.PaginationResult pagination_result = 3; // 分页结果信息
}

// --- SetFeatureFlag ---
message SetFeatureFlagReq {
  string name        = 1; // 功能开关名称
  bool   enabled     = 2; // 是否启用
  string description = 3; // 功能开关描述
  string rules       = 4; // 规则配置（JSON 格式）
  string operator_id = 5; // 操作人 ID
}

message SetFeatureFlagResp {
  common.ResponseMeta meta = 1; // 响应元数据
  FeatureFlag         flag = 2; // 更新后的功能开关
}
