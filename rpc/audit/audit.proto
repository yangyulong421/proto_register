syntax = "proto3";

package audit;

option go_package = "proto_register/rpc/audit";

import "common/common.proto";

// =============================================================================
// Audit 审计服务 — RPC 接口定义
//
// 核心职责：
//   操作审计日志记录（登录/消息/群操作/好友操作等）
//   内容审核（文本/图片/视频，对接第三方审核 SDK）
//
// 职责边界：
//   - 审计日志通常通过 Kafka 异步写入，本 RPC 用于主动查询和管理操作
//   - 不负责消息存储和用户管理
// =============================================================================

// ==================== 服务特有类型 ====================

// 审计日志记录
message AuditLog {
  string             log_id        = 1; // 日志唯一标识
  string             user_id       = 2; // 操作用户 ID
  common.AuditAction action        = 3; // 操作类型
  string             resource_type = 4; // 资源类型
  string             resource_id   = 5; // 资源 ID
  string             detail        = 6; // 操作详情
  string             client_ip     = 7; // 客户端 IP 地址
  string             user_agent    = 8; // 客户端 User-Agent
  int64              created_at    = 9; // 创建时间戳
}

// 内容审核记录
message ModerationRecord {
  string                   record_id    = 1; // 审核记录唯一标识
  string                   content_type = 2; // 内容类型（text / image / video）
  string                   content_id   = 3; // 内容 ID
  string                   content      = 4; // 待审核内容
  common.ModerationResult  result       = 5; // 审核结果
  string                   reason       = 6; // 审核原因说明
  repeated string          labels       = 7; // 命中的标签列表（如涉黄、涉政等）
  double                   confidence   = 8; // 置信度（0.0 ~ 1.0）
  int64                    created_at   = 9; // 创建时间戳
}

// ==================== 服务定义 ====================

service AuditService {
  // 创建审计日志
  rpc CreateAuditLog(CreateAuditLogRequest) returns (CreateAuditLogResponse);
  // 批量创建审计日志
  rpc BatchCreateAuditLog(BatchCreateAuditLogRequest) returns (BatchCreateAuditLogResponse);
  // 查询审计日志（支持多条件筛选）
  rpc QueryAuditLogs(QueryAuditLogsRequest) returns (QueryAuditLogsResponse);
  // 获取审计日志详情
  rpc GetAuditLog(GetAuditLogRequest) returns (GetAuditLogResponse);
  // 获取指定用户的审计日志
  rpc GetUserAuditLogs(GetUserAuditLogsRequest) returns (GetUserAuditLogsResponse);
  // 内容审核
  rpc ContentModeration(ContentModerationRequest) returns (ContentModerationResponse);
  // 获取审核结果
  rpc GetModerationResult(GetModerationResultRequest) returns (GetModerationResultResponse);
}

// ==================== 请求/响应 ====================

// --- CreateAuditLog ---
message CreateAuditLogRequest {
  string             user_id       = 1; // 操作用户 ID
  common.AuditAction action        = 2; // 操作类型
  string             resource_type = 3; // 资源类型
  string             resource_id   = 4; // 资源 ID
  string             detail        = 5; // 操作详情
  string             client_ip     = 6; // 客户端 IP 地址
  string             user_agent    = 7; // 客户端 User-Agent
}

message CreateAuditLogResponse {
  common.ResponseMeta meta   = 1; // 响应元数据
  string               log_id = 2; // 创建的审计日志 ID
}

// --- BatchCreateAuditLog ---
message BatchCreateAuditLogRequest {
  repeated CreateAuditLogRequest logs = 1; // 审计日志列表
}

message BatchCreateAuditLogResponse {
  common.ResponseMeta meta         = 1; // 响应元数据
  repeated string     log_ids      = 2; // 成功创建的日志 ID 列表
  int32               failed_count = 3; // 失败数量
}

// --- QueryAuditLogs ---
message QueryAuditLogsRequest {
  string             user_id       = 1; // 操作用户 ID（可选筛选条件）
  common.AuditAction action        = 2; // 操作类型（可选筛选条件）
  string             resource_type = 3; // 资源类型（可选筛选条件）
  string             resource_id   = 4; // 资源 ID（可选筛选条件）
  common.TimeRange   time_range    = 5; // 时间范围
  string             client_ip     = 6; // 客户端 IP（可选筛选条件）
  string             keyword       = 7; // 关键字搜索
  common.Pagination  pagination    = 8; // 分页参数
}

message QueryAuditLogsResponse {
  common.ResponseMeta     meta       = 1; // 响应元数据
  repeated AuditLog       logs       = 2; // 审计日志列表
  common.PaginationResult pagination = 3; // 分页结果
}

// --- GetAuditLog ---
message GetAuditLogRequest {
  string log_id = 1; // 审计日志 ID
}

message GetAuditLogResponse {
  common.ResponseMeta meta = 1; // 响应元数据
  AuditLog             log  = 2; // 审计日志详情
}

// --- GetUserAuditLogs ---
message GetUserAuditLogsRequest {
  string                      user_id    = 1; // 用户 ID
  repeated common.AuditAction actions    = 2; // 操作类型列表（可选筛选条件）
  common.TimeRange            time_range = 3; // 时间范围
  common.Pagination           pagination = 4; // 分页参数
}

message GetUserAuditLogsResponse {
  common.ResponseMeta     meta       = 1; // 响应元数据
  repeated AuditLog       logs       = 2; // 审计日志列表
  common.PaginationResult pagination = 3; // 分页结果
}

// --- ContentModeration ---
message ContentModerationRequest {
  string content_type = 1; // 内容类型（text / image / video）
  string content_id   = 2; // 内容 ID
  string content      = 3; // 待审核内容
  string user_id      = 4; // 提交审核的用户 ID
  string scene        = 5; // 审核场景（chat / profile / group_name）
}

message ContentModerationResponse {
  common.ResponseMeta meta   = 1; // 响应元数据
  ModerationRecord    record = 2; // 审核记录
}

// --- GetModerationResult ---
message GetModerationResultRequest {
  string record_id = 1; // 审核记录 ID
}

message GetModerationResultResponse {
  common.ResponseMeta meta   = 1; // 响应元数据
  ModerationRecord    record = 2; // 审核记录详情
}
